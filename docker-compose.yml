services:
  postgres:
    image: postgres:16-alpine
    container_name: liftiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liftiq
      POSTGRES_USER: liftiq
      POSTGRES_PASSWORD: liftiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://liftiq:liftiq@postgres:5432/liftiq?schema=public
      PORT: 4000
      NODE_ENV: development
      APP_URL: http://localhost:3000
      SESSION_COOKIE_NAME: liftiq_session
      SESSION_TTL_DAYS: 30
    ports:
      - "4000:4000"

  web:
    build:
      context: ./web
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
