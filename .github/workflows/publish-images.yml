name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deploys: a newer push cancels any in-flight run so concurrent jobs
# never fight over the single droplet's git checkout + docker build (which was
# causing SSH connection-reset failures). The newest run pulls all of main, so
# cancelling older runs loses nothing.
concurrency:
  group: publish-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/filipelagrenade/trainingapp-backend
  WEB_IMAGE: ghcr.io/filipelagrenade/trainingapp-web

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/publish-images.yml'
            web:
              - 'web/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/publish-images.yml'

  publish-backend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.backend == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  publish-web:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.web == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract web metadata
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_BUILD_ID=${{ github.sha }}
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    runs-on: ubuntu-latest
    needs: [publish-backend, publish-web]
    if: |
      always() &&
      !cancelled() &&
      (needs.publish-backend.result == 'success' || needs.publish-backend.result == 'skipped') &&
      (needs.publish-web.result == 'success' || needs.publish-web.result == 'skipped')
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GHCR_PAT
          script: |
            set -e
            cd /root/liftiq
            # Rebase keeps droplet-local commits (edge config) on top of main.
            git pull --rebase origin main
            # Authenticate to GHCR for the private image pulls. A persistent
            # login also exists on the box; this refreshes it each deploy so a
            # token rotation can't silently break pulls.
            echo "$GHCR_PAT" | docker login ghcr.io -u filipelagrenade --password-stdin
            # Pull the prebuilt images CI just published — NO build on the box
            # (on-box Next.js builds OOM'd the shared 2 GB droplet).
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            # Apply any pending Prisma migrations BEFORE rolling out the new
            # backend. The migrate service reuses the freshly pulled backend
            # image (bundles prisma/ + migrations). Additive migrations are safe
            # to run while the old backend is still serving.
            docker compose -f docker-compose.prod.yml --env-file .env.production --profile ops run --rm migrate
            # Roll out using the pulled images.
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans
            docker image prune -f
